name: Blitz
version: 2.0.2
main: fr.herocraft.blitz.BlitzPlugin
api-version: '1.21'
author: HeroCraft
description: Plugin Blitz – lobby d'attente, join aléatoire, retour position, GUI amélioré, leaderboard

commands:
  blitz:
    description: Commande principale du plugin Blitz
    usage: /blitz <join|joinrandom|leave|gui|stats|...>
    aliases: [bz]
  arenas:
    description: Ouvrir le GUI de sélection d'arène
    usage: /arenas
    aliases: [arena]

permissions:
  blitz.admin:
    description: Accès aux commandes d'administration du Blitz
    default: op
  blitz.play:
    description: Accès au jeu Blitz
    default: true
