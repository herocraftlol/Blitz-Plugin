# Configuration du plugin Blitz v2.1 - HeroCraft

server-name: "HeroCraft"
game-name: "Blitz"

# Spawn du lobby global (rempli via /blitz setlobby)
lobby:
  world: ""
  x: 0.0
  y: 0.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# Temps en secondes avant le début de la partie
countdown-seconds: 15

# Temps en secondes avant le redémarrage de l'arène après victoire
restart-seconds: 8

# Intervalle de restauration des coffres en secondes (10 min par défaut)
chest-refill-seconds: 600

# Score par défaut pour gagner
default-score-limit: 5

# Blocs que les joueurs peuvent casser pendant la partie (en plus des blocs qu'ils ont posés).
# Utile pour les toiles (cobweb), par exemple.
# Format : liste de noms de Material Bukkit (ex: COBWEB, GRASS, etc.)
breakable-blocks:
  - COBWEB
